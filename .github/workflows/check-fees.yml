name: Check USCIS G-1055 Fees

on:
  schedule:
    # Twice daily: 16:00 UTC (~9 AM PT) and 22:00 UTC (~3 PM PT)
    # Drifts by 1 hour during PST (winter) — close enough.
    - cron: "0 16,22 * * *"
  workflow_dispatch:

jobs:
  check-fees:
    name: Hash + consensus extraction
    runs-on: ubuntu-latest
    permissions:
      contents: write   # commit fees.json + .fee_check_state.json updates
      issues: write     # open issues on changes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet anthropic requests

      - name: Run fee checker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/check_fees.py

      - name: Commit state changes if any
        if: success()
        run: |
          if [[ -n "$(git status --porcelain fees.json .fee_check_state.json)" ]]; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add fees.json .fee_check_state.json
            git commit -m "chore: fee check state $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
            git push
          else
            echo "No state changes - nothing to commit."
          fi
